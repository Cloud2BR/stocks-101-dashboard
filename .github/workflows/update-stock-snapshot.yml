name: Update Stock Snapshot

on:
  schedule:
    - cron: '15 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh stock snapshot
        run: node scripts/update-stock-snapshot.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- src/data/stocks-snapshot.json; then
            echo "No snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/stocks-snapshot.json
          git commit -m "chore: refresh stock snapshot"
          git push
